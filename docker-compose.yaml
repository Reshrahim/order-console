services:
  # ── Infrastructure ─────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dapr_state
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  placement:
    image: "daprio/placement:latest"
    command: ["./placement", "-port", "50006"]
    ports:
      - "50006:50006"

  # ── Service A: orders-api ──────────────────────────────────

  orders-api:
    build: ./services/orders-api
    environment:
      APP_PORT: "3000"
      DAPR_HTTP_PORT: "3500"
    ports:
      - "3000:3000"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy

  orders-api-dapr:
    image: "daprio/daprd:latest"
    command:
      - "./daprd"
      - "-app-id"
      - "orders-api"
      - "-app-port"
      - "3000"
      - "-dapr-http-port"
      - "3500"
      - "-dapr-grpc-port"
      - "50001"
      - "-placement-host-address"
      - "placement:50006"
      - "-resources-path"
      - "/components"
      - "-log-level"
      - "info"
    volumes:
      - ./dapr/components:/components
    network_mode: "service:orders-api"
    depends_on:
      - orders-api

  # ── Service B: fulfillment-worker ──────────────────────────

  fulfillment-worker:
    build: ./services/fulfillment-worker
    environment:
      APP_PORT: "3002"
      DAPR_HTTP_PORT: "3500"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy

  fulfillment-worker-dapr:
    image: "daprio/daprd:latest"
    command:
      - "./daprd"
      - "-app-id"
      - "fulfillment-worker"
      - "-app-port"
      - "3002"
      - "-dapr-http-port"
      - "3500"
      - "-dapr-grpc-port"
      - "50001"
      - "-placement-host-address"
      - "placement:50006"
      - "-resources-path"
      - "/components"
      - "-log-level"
      - "info"
    volumes:
      - ./dapr/components:/components
    network_mode: "service:fulfillment-worker"
    depends_on:
      - fulfillment-worker

  # ── UI ─────────────────────────────────────────────────────

  ui:
    build:
      context: ./ui
      args:
        API_URL: "http://orders-api:3000"
    ports:
      - "3001:3000"
    environment:
      API_URL: "http://orders-api:3000"
    depends_on:
      - orders-api

volumes:
  pgdata:
