apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: radius-dapr-manager
rules:
  - apiGroups: ["dapr.io"]
    resources:
      - components
      - subscriptions
      - configurations
      - resiliencies
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: radius-dapr-manager-binding
subjects:
  - kind: ServiceAccount
    name: dynamic-rp
    namespace: radius-system
roleRef:
  kind: ClusterRole
  name: radius-dapr-manager
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: radius-crd-reader
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources:
      - customresourcedefinitions
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: radius-crd-reader-binding
subjects:
  - kind: ServiceAccount
    name: dynamic-rp
    namespace: radius-system
roleRef:
  kind: ClusterRole
  name: radius-crd-reader
  apiGroup: rbac.authorization.k8s.io
  